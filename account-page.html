<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMap | Account</title>
    <style>
        :root {
            --bg-dark: #161D26;
            --bg-accent: #273240;
            --primary-blue: #52C5F2;
            --primary-salmon: #F27D72;
            --text-off-white: #F6F2E6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-off-white);
            font-family: "proxima-nova", "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3, .logo, .section-title, .action-btn, .logout-btn, .small-btn {
            font-family: "din-2014", sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        header {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-accent);
        }

        .logo {
            font-size: 1.8rem;
            color: var(--primary-blue);
            text-decoration: none;
        }

        nav a {
            color: var(--text-off-white);
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover,
        nav a.active {
            color: var(--primary-salmon);
        }

        .page {
            width: min(1180px, 92vw);
            margin: 0 auto;
            padding: 3rem 0;
            display: grid;
            gap: 2rem;
        }

        .hero-card,
        .content-card {
            background-color: var(--bg-accent);
            border-radius: 10px;
            padding: 2rem;
        }

        .hero-card {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 1.5rem;
            align-items: center;
        }

        .avatar-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }

        .avatar {
            width: 92px;
            height: 92px;
            border-radius: 50%;
            background-color: var(--primary-blue);
            color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            font-weight: 800;
        }

        .small-btn {
            background-color: transparent;
            color: var(--primary-blue);
            border: 2px solid var(--primary-blue);
            padding: 0.55rem 0.85rem;
            border-radius: 4px;
            font-size: 0.75rem;
            text-decoration: none;
            cursor: pointer;
        }

        .small-btn:hover {
            background-color: var(--primary-blue);
            color: var(--bg-dark);
        }

        .identity h1 {
            margin: 0 0 0.4rem 0;
            font-size: 2.2rem;
            line-height: 1.1;
        }

        .identity p {
            margin: 0;
            color: #bbb;
            font-size: 1rem;
        }

        .pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin-top: 1rem;
        }

        .pill {
            background-color: rgba(82, 197, 242, 0.12);
            color: var(--primary-blue);
            border: 1px solid rgba(82, 197, 242, 0.22);
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            font-size: 0.8rem;
        }

        .hero-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.8rem;
        }

        .logout-btn,
        .action-btn {
            text-decoration: none;
            border-radius: 4px;
            padding: 0.75rem 1.1rem;
            font-size: 0.85rem;
            transition: 0.3s;
            text-align: center;
            min-width: 150px;
        }

        .action-btn {
            background-color: var(--primary-salmon);
            color: var(--bg-dark);
        }

        .action-btn:hover {
            transform: scale(1.03);
        }

        .logout-btn {
            background-color: transparent;
            color: var(--primary-salmon);
            border: 2px solid var(--primary-salmon);
        }

        .logout-btn:hover {
            background-color: var(--primary-salmon);
            color: var(--bg-dark);
        }

        .stats-grid,
        .main-grid,
        .secondary-grid {
            display: grid;
            gap: 2rem;
        }

        .stats-grid {
            grid-template-columns: repeat(3, 1fr);
        }

        .stat-card {
            background-color: var(--bg-accent);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-card strong {
            display: block;
            font-size: 2rem;
            color: var(--primary-blue);
            margin-bottom: 0.35rem;
        }

        .stat-card span {
            color: #bbb;
            font-size: 0.95rem;
        }

        .main-grid {
            grid-template-columns: 1.25fr 0.75fr;
            align-items: start;
        }

        .secondary-grid {
            grid-template-columns: 1fr 1fr;
        }

        .section-title {
            margin: 0 0 1.2rem 0;
            font-size: 1.15rem;
            color: var(--primary-blue);
        }

        .saved-list,
        .badges-list,
        .settings-list,
        .progress-list {
            display: grid;
            gap: 1rem;
        }

        .saved-item,
        .badge-item,
        .settings-item {
            background-color: rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 1rem;
        }

        .saved-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .saved-text h3,
        .badge-item h3,
        .settings-item h3 {
            margin: 0 0 0.4rem 0;
            font-size: 1rem;
        }

        .saved-text p,
        .badge-item p,
        .settings-item p {
            margin: 0;
            color: #bbb;
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .resume-link {
            text-decoration: none;
            color: var(--primary-salmon);
            border: 2px solid var(--primary-salmon);
            padding: 0.55rem 0.9rem;
            border-radius: 4px;
            font-size: 0.8rem;
            transition: 0.3s;
            white-space: nowrap;
        }

        .resume-link:hover {
            background-color: var(--primary-salmon);
            color: var(--bg-dark);
        }

        .progress-item {
            display: grid;
            gap: 0.5rem;
        }

        .progress-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .progress-top span:first-child {
            font-weight: 700;
        }

        .progress-top span:last-child {
            color: var(--primary-blue);
            font-weight: 700;
        }

        .progress-bar {
            height: 12px;
            border-radius: 999px;
            background-color: rgba(255,255,255,0.10);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--primary-blue), #8fdfff);
        }

        .badge-item {
            border-left: 4px solid var(--primary-blue);
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .settings-edit {
            color: var(--primary-salmon);
            text-decoration: none;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .settings-edit:hover {
            text-decoration: underline;
        }

        .empty-state {
            color: #bbb;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        footer {
            margin-top: auto;
            padding: 3rem 5%;
            text-align: center;
            font-size: 0.85rem;
            border-top: 1px solid var(--bg-accent);
            color: #888;
        }

        @media (max-width: 980px) {
            .hero-card,
            .main-grid,
            .secondary-grid,
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .hero-actions {
                align-items: flex-start;
            }
        }

        @media (max-width: 760px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            nav a {
                margin-left: 0;
                margin-right: 1.5rem;
            }

            .saved-item,
            .settings-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .identity h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">CodeMap</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="learn.html">Learn</a>
            <a href="about.html">About</a>
            <a href="account-page.html" class="active">Account</a>
            <a href="login-signup.html" id="navLogout">Logout</a>
        </nav>
    </header>

    <main class="page">
        <section class="hero-card">
            <div class="avatar-wrap">
                <div class="avatar" id="avatar">CM</div>
                <button class="small-btn" type="button">Edit Profile</button>
            </div>

            <div class="identity">
                <h1 id="userName">CodeMap Student</h1>
                <p id="userSubtitle">Signed in user</p>
                <div class="pill-row" id="pillRow">
                    <span class="pill">Student</span>
                </div>
            </div>

            <div class="hero-actions">
                <a href="continue-lesson.html" class="action-btn">Continue Learning</a>
                <a href="login-signup.html" class="logout-btn" id="logoutBtn">Log Out</a>
            </div>
        </section>

        <section class="stats-grid">
            <div class="stat-card">
                <strong id="savedCount">0</strong>
                <span>Saved Tutorials</span>
            </div>
            <div class="stat-card">
                <strong id="languageCount">0</strong>
                <span>Languages In Progress</span>
            </div>
            <div class="stat-card">
                <strong id="badgeCount">0</strong>
                <span>Badges Earned</span>
            </div>
        </section>

        <section class="main-grid">
            <div class="content-card">
                <h2 class="section-title">Saved Tutorials</h2>
                <div class="saved-list" id="savedTutorialsList"></div>
            </div>

            <div class="content-card">
                <h2 class="section-title">Progress by Language</h2>
                <div class="progress-list" id="progressList"></div>
            </div>
        </section>

        <section class="secondary-grid">
            <div class="content-card">
                <h2 class="section-title">Badges</h2>
                <div class="badges-list" id="badgesList"></div>
            </div>

            <div class="content-card">
                <h2 class="section-title">Account Details</h2>
                <div class="settings-list" id="settingsList"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 CodeMap | Account Dashboard</p>
    </footer>

    <script>
        const CURRENT_USER_KEY = "codemap_current_user";

        function getCurrentUser() {
            const sessionUser = sessionStorage.getItem(CURRENT_USER_KEY);
            const localUser = localStorage.getItem(CURRENT_USER_KEY);
            const rawUser = sessionUser || localUser;

            if (!rawUser) {
                return null;
            }

            try {
                return JSON.parse(rawUser);
            } catch (error) {
                return null;
            }
        }

        function logoutUser(event) {
            event.preventDefault();
            sessionStorage.removeItem(CURRENT_USER_KEY);
            localStorage.removeItem(CURRENT_USER_KEY);
            window.location.href = "login-signup.html";
        }

        function makeInitials(firstName, lastName) {
            const first = firstName ? firstName.charAt(0) : "";
            const last = lastName ? lastName.charAt(0) : "";
            return (first + last).toUpperCase() || "CM";
        }

        function titleFromKey(key) {
            const mapping = {
                cpp: "C++",
                python: "Python",
                matlab: "MATLAB",
                ros2: "ROS2",
                java: "Java",
                javascript: "JavaScript"
            };

            return mapping[key] || key.toUpperCase();
        }

        function renderSavedTutorials(savedTutorials) {
            const container = document.getElementById("savedTutorialsList");

            if (!savedTutorials || !savedTutorials.length) {
                container.innerHTML = '<p class="empty-state">No saved tutorials yet. Start exploring the Learn page to save content here.</p>';
                return;
            }

            container.innerHTML = savedTutorials.map(function(tutorial, index) {
                return `
                    <div class="saved-item">
                        <div class="saved-text">
                            <h3>${tutorial}</h3>
                            <p>Saved lesson ${index + 1} ready to resume.</p>
                        </div>
                        <a href="continue-lesson.html" class="resume-link">Resume</a>
                    </div>
                `;
            }).join("");
        }

        function renderProgress(progress) {
            const container = document.getElementById("progressList");
            const keys = progress ? Object.keys(progress).filter(function(key) {
                return Number(progress[key]) > 0;
            }) : [];

            if (!keys.length) {
                container.innerHTML = '<p class="empty-state">No progress data yet. Complete a lesson to start tracking language progress.</p>';
                return;
            }

            container.innerHTML = keys.map(function(key) {
                const value = Math.max(0, Math.min(100, Number(progress[key]) || 0));

                return `
                    <div class="progress-item">
                        <div class="progress-top">
                            <span>${titleFromKey(key)}</span>
                            <span>${value}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${value}%;"></div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function renderBadges(badges) {
            const container = document.getElementById("badgesList");

            if (!badges || !badges.length) {
                container.innerHTML = '<p class="empty-state">No badges earned yet. Complete challenges and lessons to unlock achievements.</p>';
                return;
            }

            container.innerHTML = badges.map(function(badge) {
                return `
                    <div class="badge-item">
                        <h3>${badge}</h3>
                        <p>Achievement unlocked through lesson progress and platform activity.</p>
                    </div>
                `;
            }).join("");
        }

        function renderSettings(user) {
            const container = document.getElementById("settingsList");

            container.innerHTML = `
                <div class="settings-item">
                    <div>
                        <h3>Full Name</h3>
                        <p>${user.firstName || ""} ${user.lastName || ""}</p>
                    </div>
                    <a href="#" class="settings-edit">Edit</a>
                </div>

                <div class="settings-item">
                    <div>
                        <h3>Email</h3>
                        <p>${user.email || "No email set"}</p>
                    </div>
                    <a href="#" class="settings-edit">Edit</a>
                </div>

                <div class="settings-item">
                    <div>
                        <h3>Major / Track</h3>
                        <p>${user.major || "Not set"}</p>
                    </div>
                    <a href="#" class="settings-edit">Edit</a>
                </div>

                <div class="settings-item">
                    <div>
                        <h3>Academic Year</h3>
                        <p>${user.year || "Not set"}</p>
                    </div>
                    <a href="#" class="settings-edit">Edit</a>
                </div>
            `;
        }

        function renderPage(user) {
            const fullName = ((user.firstName || "") + " " + (user.lastName || "")).trim() || "CodeMap Student";
            const subtitleParts = [];

            if (user.year) {
                subtitleParts.push(user.year);
            }

            if (user.major) {
                subtitleParts.push(user.major);
            }

            if (user.email) {
                subtitleParts.push(user.email);
            }

            document.getElementById("userName").textContent = fullName;
            document.getElementById("userSubtitle").textContent = subtitleParts.join(" | ") || "Signed in user";
            document.getElementById("avatar").textContent = makeInitials(user.firstName, user.lastName);

            const pillRow = document.getElementById("pillRow");
            const pills = [];

            if (user.major) {
                pills.push(`<span class="pill">${user.major}</span>`);
            }

            if (user.year) {
                pills.push(`<span class="pill">${user.year}</span>`);
            }

            if (user.email) {
                pills.push(`<span class="pill">${user.email}</span>`);
            }

            if (!pills.length) {
                pills.push('<span class="pill">Student</span>');
            }

            pillRow.innerHTML = pills.join("");

            const savedTutorials = user.savedTutorials || [];
            const badges = user.badges || [];
            const progress = user.progress || {};

            document.getElementById("savedCount").textContent = savedTutorials.length;
            document.getElementById("badgeCount").textContent = badges.length;
            document.getElementById("languageCount").textContent = Object.keys(progress).filter(function(key) {
                return Number(progress[key]) > 0;
            }).length;

            renderSavedTutorials(savedTutorials);
            renderProgress(progress);
            renderBadges(badges);
            renderSettings(user);
        }

        const currentUser = getCurrentUser();

        if (!currentUser) {
            window.location.href = "login-signup.html";
        } else {
            renderPage(currentUser);
        }

        document.getElementById("logoutBtn").addEventListener("click", logoutUser);
        document.getElementById("navLogout").addEventListener("click", logoutUser);
    </script>
</body>
</html>
