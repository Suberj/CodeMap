<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeMap | Installation</title>
    <style>
        :root {
            --bg-dark: #161D26;
            --bg-accent: #273240;
            --panel: #1d2632;
            --border: #364558;
            --primary-blue: #52C5F2;
            --primary-salmon: #F27D72;
            --text-off-white: #F6F2E6;
            --muted: #AAB4C0;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: var(--text-off-white);
            font-family: "proxima-nova", "Helvetica Neue", Arial, sans-serif;
        }

        h1, h2, h3, .logo, .action-link {
            font-family: "din-2014", sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        header {
            padding: 1.5rem 5%;
            background: var(--bg-accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 1.8rem;
        }

        nav {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        nav a {
            color: var(--text-off-white);
            text-decoration: none;
        }

        nav a:hover,
        nav a.active {
            color: var(--primary-salmon);
        }

        .container {
            width: min(1080px, 92vw);
            margin: 0 auto;
            padding: 3rem 0;
        }

        .hero {
            margin-bottom: 2rem;
            display: grid;
            gap: 0.8rem;
        }

        .crumbs {
            color: var(--muted);
            font-size: 0.88rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .crumbs a {
            color: var(--primary-blue);
            text-decoration: none;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(2.1rem, 4vw, 3.3rem);
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
            max-width: 62ch;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.9rem;
            margin-top: 0.3rem;
        }

        .action-link {
            text-decoration: none;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(82,197,242,0.22);
            background: rgba(82,197,242,0.08);
            color: var(--primary-blue);
            font-size: 0.82rem;
        }

        .step-list {
            display: grid;
            gap: 1.5rem;
        }

        .step {
            background: linear-gradient(180deg, rgba(39,50,64,0.95), rgba(22,29,38,0.98));
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 18px;
            padding: 1.4rem;
        }

        .step h2 {
            margin: 0 0 0.75rem;
            color: var(--primary-salmon);
            font-size: 1.1rem;
        }

        .step p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .command {
            display: block;
            width: 100%;
            overflow-x: auto;
            background: rgba(8,13,20,0.72);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.95rem 1rem;
            color: var(--primary-blue);
            font-family: "Courier New", monospace;
            white-space: pre-wrap;
            margin-top: 1rem;
        }

        footer {
            text-align: center;
            padding: 2rem 5%;
            color: #8a939d;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 720px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a class="logo" href="index.html">CodeMap</a>
        <nav>
            <a href="index.html">Home</a>
            <a class="active" href="learn.html">Learn</a>
            <a href="about.html">About</a>
            <a href="account-page.html">Account</a>
            <a href="login-signup.html">Login</a>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <div class="crumbs">
                <a href="index.html">Home</a>
                <span>&rsaquo;</span>
                <a href="learn.html">Learn</a>
                <span>&rsaquo;</span>
                <a id="hubLink" href="language-page.html">Language Hub</a>
                <span>&rsaquo;</span>
                <span>Installation</span>
            </div>
            <h1 id="heroTitle">Installation Guide</h1>
            <p id="heroText"></p>
            <div class="actions">
                <a class="action-link" id="tutorialLink" href="tutorial.html">Open Tutorial</a>
                <a class="action-link" id="docsLink" href="documentation.html">Open Documentation Guide</a>
            </div>
        </section>

        <section class="step-list" id="stepList"></section>
    </main>

    <footer>&copy; 2026 CodeMap | Installation</footer>

    <script src="language-data.js"></script>
    <script>
    (function() {
        const all = window.CODEMAP_LANGUAGES || {};
        const params = new URLSearchParams(window.location.search);
        const savedLang = localStorage.getItem('codemap_last_lang');
        const requested = (params.get('lang') || savedLang || 'python').toLowerCase();
        const key = all[requested] ? requested : 'python';
        const lang = all[key];
        localStorage.setItem('codemap_last_lang', key);

        function pageLink(page) {
            return page + '?lang=' + encodeURIComponent(key);
        }

        document.title = 'CodeMap | ' + lang.label + ' Installation';
        document.getElementById('heroTitle').textContent = lang.install?.heroTitle || (lang.label + ' Installation Guide');
        document.getElementById('heroText').textContent = lang.install?.heroText || '';
        document.getElementById('hubLink').textContent = lang.label;
        document.getElementById('hubLink').href = pageLink('language-page.html');
        document.getElementById('tutorialLink').href = pageLink('tutorial.html');
        document.getElementById('docsLink').href = pageLink('documentation.html');

        const steps = lang.install?.steps || [];
        document.getElementById('stepList').innerHTML = steps.map((step) => `
            <article class="step">
                <h2>${step.title}</h2>
                <p>${step.text || ''}</p>
                ${step.command ? `<code class="command">${step.command.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code>` : ''}
            </article>
        `).join('');
    })();
    </script>
</body>
</html>
